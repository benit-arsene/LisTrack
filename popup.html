<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LisTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
      padding: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo svg { width: 22px; height: 22px; color: #6366f1; }
    .logo h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .desc { font-size: 11px; color: #6b7280; margin-bottom: 14px; line-height: 1.4; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: #4f46e5; transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn svg { width: 16px; height: 16px; }
    .token-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    .token-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .token-display {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 8px 10px;
      border-radius: 8px;
      word-break: break-all;
      line-height: 1.4;
      user-select: all;
      cursor: text;
    }
    .copy-btn {
      margin-top: 6px;
      font-size: 10px;
      color: #6366f1;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      padding: 4px 0;
    }
    .copy-btn:hover { color: #4f46e5; }
    .footer {
      margin-top: 12px;
      font-size: 9px;
      color: #d1d5db;
      text-align: center;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      font-size: 12px;
      color: #9ca3af;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      font-size: 11px;
      color: #ef4444;
      text-align: center;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Loading...
    </div>
  </div>

  <script>
    const SERVER_URL = "https://listrack-2.onrender.com";

    (async function () {
      const app = document.getElementById("app");

      try {
        const result = await chrome.storage.local.get(["lisTrackUserToken"]);
        let token = result.lisTrackUserToken;

        if (!token) {
          // No token yet — generate one via the background script
          const response = await new Promise((resolve, reject) => {
            chrome.runtime.sendMessage("getUserToken", (res) => {
              if (chrome.runtime.lastError) reject(chrome.runtime.lastError);
              else resolve(res);
            });
          });
          token = response.token;
        }

        if (!token) {
          app.innerHTML = `<div class="error">Could not retrieve your user token. Try reinstalling the extension.</div>`;
          return;
        }

        const dashboardUrl = `${SERVER_URL}/dashboard.html?user=${encodeURIComponent(token)}`;

        app.innerHTML = `
          <div class="logo">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-1.605.42-3.113 1.157-4.418" />
            </svg>
            <h1>LisTrack</h1>
          </div>
          <p class="desc">Your screen time is being tracked. Open the dashboard to view your activity.</p>
          <a href="${dashboardUrl}" target="_blank" class="btn">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
            </svg>
            Open Dashboard
          </a>
          <div class="token-section">
            <div class="token-label">Your User Token</div>
            <div class="token-display" id="tokenText">${token}</div>
            <button class="copy-btn" id="copyBtn">📋 Copy to clipboard</button>
          </div>
          <div class="footer">LisTrack v1.0 — Token-based multi-user</div>
        `;

        document.getElementById("copyBtn").addEventListener("click", () => {
          navigator.clipboard.writeText(token).then(() => {
            const btn = document.getElementById("copyBtn");
            btn.textContent = "✅ Copied!";
            setTimeout(() => { btn.textContent = "📋 Copy to clipboard"; }, 2000);
          });
        });

      } catch (err) {
        app.innerHTML = `<div class="error">Error: ${err.message}</div>`;
      }
    })();
  </script>
</body>
</html>
