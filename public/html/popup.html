<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LisTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
      padding: 0;
      overflow-x: hidden;
    }

    /* ─── Header ──────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f3f4f6;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo {
      width: 20px;
      height: 20px;
      background: #6366f1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: #1f2937;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .header-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      transition: all 0.15s;
    }
    .header-btn:hover {
      background: #f3f4f6;
      color: #4b5563;
    }
    .header-btn:active { transform: scale(0.92); }
    .header-btn svg { width: 15px; height: 15px; }

    /* ─── Live Dot ────────────────────────────────────── */
    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }
    .live-dot.paused {
      background: #9ca3af;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ─── Today's Time ────────────────────────────────── */
    .time-section {
      text-align: center;
      padding: 18px 16px 14px;
    }
    .time-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .time-value {
      font-size: 32px;
      font-weight: 800;
      color: #1f2937;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    .time-value.paused-text { color: #9ca3af; }
    .time-sub {
      font-size: 11px;
      color: #6b7280;
      margin-top: 4px;
    }

    /* ─── Stats Row ───────────────────────────────────── */
    .stats-row {
      display: flex;
      gap: 0;
      padding: 0 16px 12px;
      border-bottom: 1px solid #f3f4f6;
    }
    .stat-item {
      flex: 1;
      text-align: center;
      padding: 6px 0;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 500;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    /* ─── Top Sites Section ────────────────────────────── */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 10px 16px 6px;
    }
    .site-list { padding: 0 12px 8px; }
    .site-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 4px;
      border-radius: 8px;
      transition: background 0.1s;
    }
    .site-row:hover { background: #f9fafb; }
    .site-rank {
      width: 14px;
      font-size: 10px;
      font-weight: 600;
      color: #d1d5db;
      text-align: right;
      flex-shrink: 0;
    }
    .site-favicon {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
      background: #f3f4f6;
    }
    .site-name {
      flex: 1;
      font-size: 11px;
      font-weight: 500;
      color: #374151;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .site-time {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
      flex-shrink: 0;
    }
    .site-empty {
      text-align: center;
      padding: 16px;
      font-size: 11px;
      color: #d1d5db;
    }

    /* ─── Goals Section ────────────────────────────────── */
    .goals-summary {
      padding: 6px 16px 8px;
      border-top: 1px solid #f3f4f6;
    }
    .goals-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .goals-title {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .goals-count {
      font-size: 10px;
      font-weight: 600;
      color: #6b7280;
    }
    .goals-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .goal-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
    }
    .goal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .goal-dot.exceeded { background: #ef4444; }
    .goal-dot.approaching { background: #f59e0b; }
    .goal-dot.ok { background: #22c55e; }
    .goal-dot.disabled { background: #d1d5db; }
    .goal-name {
      color: #6b7280;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .goal-status {
      color: #9ca3af;
      flex-shrink: 0;
    }
    .goal-status.exceeded { color: #ef4444; font-weight: 600; }
    .goal-status.approaching { color: #f59e0b; font-weight: 600; }
    .goals-empty {
      font-size: 10px;
      color: #d1d5db;
      text-align: center;
      padding: 4px 0;
    }

    /* ─── Pause Banner ─────────────────────────────────── */
    .pause-banner {
      margin: 0 16px 8px;
      padding: 8px 12px;
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: 10px;
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 500;
      color: #92400e;
    }
    .pause-banner.visible { display: flex; }
    .pause-banner svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ─── Actions ──────────────────────────────────────── */
    .actions {
      padding: 8px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-primary:hover { background: #4f46e5; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary svg { width: 15px; height: 15px; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 8px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      background: #f3f4f6;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: #e5e7eb; color: #374151; }
    .btn-secondary:active { transform: scale(0.98); }
    .btn-secondary svg { width: 14px; height: 14px; }
    .btn-secondary.danger { color: #ef4444; }
    .btn-secondary.danger:hover { background: #fef2f2; }

    /* ─── Token ────────────────────────────────────────── */
    .token-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px 12px;
    }
    .token-text {
      flex: 1;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 9px;
      color: #d1d5db;
      background: #f9fafb;
      padding: 4px 8px;
      border-radius: 6px;
      user-select: all;
      cursor: text;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .token-copy {
      font-size: 9px;
      color: #6366f1;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      padding: 4px 6px;
      border-radius: 6px;
      transition: all 0.1s;
      flex-shrink: 0;
    }
    .token-copy:hover { background: #eef2ff; }

    /* ─── Loading & Error ──────────────────────────────── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 200px;
      font-size: 12px;
      color: #9ca3af;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      font-size: 11px;
      color: #ef4444;
      text-align: center;
      padding: 24px 16px;
      line-height: 1.4;
    }
    .error-retry {
      display: inline-block;
      margin-top: 8px;
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      background: #ef4444;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .error-retry:hover { background: #dc2626; }

    /* ─── Footer ───────────────────────────────────────── */
    .footer {
      font-size: 8px;
      color: #e5e7eb;
      text-align: center;
      padding: 0 16px 10px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Loading your stats...
    </div>
  </div>

  <script src="../js/popup.js"></script>
</body>
</html>
