<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LisTrack</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #1f2937;
      padding: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo svg { width: 22px; height: 22px; color: #6366f1; }
    .logo h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
    .desc { font-size: 11px; color: #6b7280; margin-bottom: 14px; line-height: 1.4; }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #6366f1;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: #4f46e5; transform: scale(1.02); }
    .btn:active { transform: scale(0.98); }
    .btn svg { width: 16px; height: 16px; }
    .token-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
    }
    .token-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .token-display {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 11px;
      color: #6b7280;
      background: #f3f4f6;
      padding: 8px 10px;
      border-radius: 8px;
      word-break: break-all;
      line-height: 1.4;
      user-select: all;
      cursor: text;
    }
    .copy-btn {
      margin-top: 6px;
      font-size: 10px;
      color: #6366f1;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 500;
      padding: 4px 0;
    }
    .copy-btn:hover { color: #4f46e5; }
    .footer {
      margin-top: 12px;
      font-size: 9px;
      color: #d1d5db;
      text-align: center;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 120px;
      font-size: 12px;
      color: #9ca3af;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      font-size: 11px;
      color: #ef4444;
      text-align: center;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      Loading...
    </div>
  </div>

  <script src="../js/popup.js"></script>
</body>
</html>
